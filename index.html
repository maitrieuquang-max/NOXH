  // điểm 2.2.2.2: quy mô dân số tối đa 1 đơn vị ở đô thị
  cayxanh_dvo_min: 2,
  // điểm 2.2.3.1: đất cây xanh SDCC trong đơn vị ở ≥ 2 m²/người
  mamnon_min: 0.60,
  // Bảng 6: đất trường mầm non cấp đơn vị ở ≥ 0,60 m²/người
  ham_max_pct: 85,
  tang_ham_max: 5,
  tang_noxh_max: 35,
  ln_dt_min_ref: 15,
  ln_von_min_ref: 20
};
const fmt0 = n => isFinite(n) ? Math.round(n).toLocaleString("vi-VN") : "—";
const fmt1 = n => isFinite(n) ? n.toFixed(1) : "—";
const fmt2 = n => isFinite(n) ? n.toFixed(2) : "—";
const fmtTy = n => isFinite(n) ? (n / 1e9).toFixed(1) : "—";
function compute(v) {
  const dt_kha_dung = v.dt_dat_tong - v.dt_dat_vuong;
  const tang_thap = v.tong_tang - v.tang_de;

  // III. Đế - Tháp
  const fp_de = dt_kha_dung * (v.md_de / 100);
  const san_de = fp_de * v.tang_de;
  const fp_thap = dt_kha_dung * (v.md_thap / 100);
  const san_thap = fp_thap * tang_thap;
  const gfa_noi = san_de + san_thap;
  const far = dt_kha_dung ? gfa_noi / dt_kha_dung : 0;
  const fp_1thap = v.so_thap ? fp_thap / v.so_thap : 0;
  const can_tang_thap = fp_1thap * (v.hssdsan / 100) * (v.hstt / 100) / v.dt_canho;
  const dat_can_thap = v.so_thap * (Math.sqrt(Math.max(fp_1thap, 0)) + 40) ** 2;
  const mdxd_toiuu = v.so_thap && dt_kha_dung ? 857 * v.so_thap / dt_kha_dung * 100 : 0;

  // Đối chiếu QCVN 01:2026/BXD (Bảng 9, nội suy theo diện tích lô; áp dụng riêng khối đế / khối tháp)
  const h_de = v.tang_de * v.chieucao_tang;
  const h_ct = v.tong_tang * v.chieucao_tang;
  const mdxd_de_lim = mdxdMaxQC2026(h_de, dt_kha_dung);
  const mdxd_thap_lim = mdxdMaxQC2026(h_ct, dt_kha_dung);
  // Ngoại lệ FAR 18 lần theo 2.5.3.5: thửa đất ≥ 3,5 ha và MĐXD thuần ≤ 35% (+ điều kiện quy hoạch khác)
  const far_ngoai_le = dt_kha_dung >= 35000 && v.md_de <= 35 && v.md_thap <= 35;

  // IV. Hầm & đỗ xe
  const fp_ham = dt_kha_dung * (v.md_ham / 100);
  const san_ham = fp_ham * v.tang_ham;
  const ham_kha_dung = san_ham * (v.hieuqua_ham / 100);
  const dt_sudung_canho = san_thap * (v.hssdsan / 100) * (v.hstt / 100);
  const doxe_thap = dt_sudung_canho * (v.tyle_doxe_thap / 100);
  const doxe_de = san_de * (v.tyle_doxe_de / 100);
  const doxe_tong = doxe_thap + doxe_de;
  const doi_chieu_doxe = ham_kha_dung - doxe_tong;

  // V. Dân số & căn hộ
  const so_can = Math.floor(dt_sudung_canho / v.dt_canho);
  const dan_so = so_can * v.nguoi_can;
  const so_tre = Math.ceil(dan_so / 1000 * v.chitieu_tre);
  const dat_tre = so_tre * v.chitieu_dat_tre;

  // VI. TMĐT
  const gfa_tb = gfa_noi + san_ham;
  const cp_gpmb = dt_kha_dung * v.gia_gpmb;
  // Tiền SDĐ: theo Điều 9 NĐ 100/2015/NĐ-CP, phần đất NOXH được miễn tiền SDĐ;
  // chỉ tính trên phần đất tương ứng tỷ lệ sàn thương mại (khối Đế/TMDV) trong tổng sàn nổi,
  // khấu trừ GPMB đã phân bổ cho phần đó (phương pháp hệ số điều chỉnh giá đất, NĐ 103/2024/NĐ-CP).
  const ty_le_dat_tm = gfa_noi ? san_de / gfa_noi : 0;
  const dt_dat_tm = dt_kha_dung * ty_le_dat_tm;
  const gpmb_pb_tm = cp_gpmb * ty_le_dat_tm;
  const tien_sdd_truoc_khautru = dt_dat_tm * v.gia_sdd;
  const cp_sdd = Math.max(0, tien_sdd_truoc_khautru - gpmb_pb_tm);
  const cp_hatang_noikhu = dt_kha_dung * v.dg_hatang_noikhu;
  const cp_hatang_ngoairanh = dt_kha_dung * v.dg_hatang_ngoairanh;
  const cp_xulynen = dt_kha_dung * v.dg_xulynen;
  const cp_tre = so_tre * v.suatvon_tre;
  const cp_shcd = v.dt_shcd * v.dg_shcd;
  const cp_xd = gfa_tb * v.dg_xd;
  const cp_tb = cp_xd * (v.tl_thietbi / 100);
  const cpxdtb = cp_xd + cp_tb;
  const cp_qlda = cpxdtb * (v.tl_qlda / 100);
  const cp_tuvan = cpxdtb * (v.tl_tuvan / 100);
  const cp_khac = cpxdtb * (v.tl_khac / 100);
  const cp_pccc = cpxdtb * (v.tl_pccc / 100);
  const cp_vanhanh = cpxdtb * (v.tl_vanhanh / 100);
  const cp_kiemtoan = cpxdtb * (v.tl_kiemtoan / 100);
  const cp_laivay = cpxdtb * (v.tl_vonvay / 100) * (v.ls_vay / 100) * v.tg_vay;
  const tong_truoc_dp = cp_gpmb + cp_sdd + cp_hatang_noikhu + cp_hatang_ngoairanh + cp_xulynen + cp_tre + cp_shcd + cpxdtb + cp_qlda + cp_tuvan + cp_khac + cp_pccc + cp_vanhanh + cp_kiemtoan + cp_laivay;
  const cp_duphong = tong_truoc_dp * (v.tl_duphong / 100);
  const tmdt = tong_truoc_dp + cp_duphong;

  // VII. Doanh thu — tách phần bán / phần dành cho thuê (tối thiểu 25% diện tích sàn NOXH theo quy định mới của Thành phố)
  const dt_tm = san_de * (v.tyle_khaithac_tm / 100) * v.gia_tmdv;
  const dt_thue_m2 = dt_sudung_canho * (v.tyle_chothue / 100);
  const dt_ban_m2 = dt_sudung_canho - dt_thue_m2;
  const so_can_thue = Math.round(so_can * (v.tyle_chothue / 100));
  const so_can_ban = so_can - so_can_thue;
  const ck = v.ck_thue / 100;
  const pvA = ck > 0 ? (1 - Math.pow(1 + ck, -v.so_nam_thue)) / ck : v.so_nam_thue;
  // Tiền thuê ròng/năm = DT thuê × giá thuê × 12 tháng × tỷ lệ lấp đầy × (1 − chi phí vận hành cho thuê)
  const thue_rong_nam = dt_thue_m2 * v.gia_thue_noxh * 12 * (v.tyle_lapday / 100) * (1 - v.tl_vh_thue / 100);
  const pv_thue = thue_rong_nam * pvA;
  // Bán lại phần cho thuê sau khi hết thời gian cho thuê tối thiểu, chiết khấu về hiện tại
  const pv_ban_sau = dt_thue_m2 * v.gia_noxh * (v.heso_ban_sau / 100) / Math.pow(1 + ck, v.so_nam_thue);
  const dt_noxh = dt_ban_m2 * v.gia_noxh;
  const dt_chothue = pv_thue + pv_ban_sau;
  const dt_tong = dt_tm + dt_noxh + dt_chothue;
  const ln_gop = dt_tong - tmdt;
  const ts_ln_dt = dt_tong ? ln_gop / dt_tong * 100 : 0;
  const ts_ln_von = tmdt ? ln_gop / tmdt * 100 : 0;

  // VIII. Reverse calculations
  const dt_tong_can = v.ln_muctieu < 100 ? tmdt / (1 - v.ln_muctieu / 100) : NaN;
  const dt_noxh_can = dt_tong_can - dt_tm - pv_thue;
  const mau_gia_can = dt_ban_m2 + dt_thue_m2 * (v.heso_ban_sau / 100) / Math.pow(1 + ck, v.so_nam_thue);
  const gia_noxh_can = mau_gia_can ? dt_noxh_can / mau_gia_can : NaN;
  const cp_codinh = (cp_gpmb + cp_sdd + cp_hatang_noikhu + cp_hatang_ngoairanh + cp_xulynen + cp_tre + cp_shcd) * (1 + v.tl_duphong / 100);
  const heso_k = (1 + v.tl_thietbi / 100) * (1 + (v.tl_qlda + v.tl_tuvan + v.tl_khac + v.tl_pccc + v.tl_vanhanh + v.tl_kiemtoan) / 100 + v.tl_vonvay / 100 * (v.ls_vay / 100) * v.tg_vay) * (1 + v.tl_duphong / 100);
  const dg_xd_max = gfa_tb && heso_k ? (dt_tong * (1 - v.ln_muctieu / 100) - cp_codinh) / (heso_k * gfa_tb) : NaN;
  return {
    dt_kha_dung,
    tang_thap,
    fp_de,
    san_de,
    fp_thap,
    san_thap,
    gfa_noi,
    far,
    fp_1thap,
    can_tang_thap,
    dat_can_thap,
    mdxd_toiuu,
    h_de,
    h_ct,
    mdxd_de_lim,
    mdxd_thap_lim,
    far_ngoai_le,
    fp_ham,
    san_ham,
    ham_kha_dung,
    dt_sudung_canho,
    doxe_thap,
    doxe_de,
    doxe_tong,
    doi_chieu_doxe,
    so_can,
    dan_so,
    so_tre,
    dat_tre,
    gfa_tb,
    cp_gpmb,
    ty_le_dat_tm,
    dt_dat_tm,
    gpmb_pb_tm,
    tien_sdd_truoc_khautru,
    cp_sdd,
    cp_hatang_noikhu,
    cp_hatang_ngoairanh,
    cp_xulynen,
    cp_tre,
    cp_shcd,
    cp_xd,
    cp_tb,
    cpxdtb,
    cp_qlda,
    cp_tuvan,
    cp_khac,
    cp_pccc,
    cp_vanhanh,
    cp_kiemtoan,
    cp_laivay,
    tong_truoc_dp,
    cp_duphong,
    tmdt,
    dt_tm,
    dt_noxh,
    dt_thue_m2,
    dt_ban_m2,
    so_can_thue,
    so_can_ban,
    thue_rong_nam,
    pv_thue,
    pv_ban_sau,
    dt_chothue,
    dt_tong,
    ln_gop,
    ts_ln_dt,
    ts_ln_von,
    dt_tong_can,
    dt_noxh_can,
    gia_noxh_can,
    cp_codinh,
    heso_k,
    dg_xd_max
  };
}
function warnings(v, r) {
  const w = [];
  const push = (level, text) => w.push({
    level,
    text
  });
  if (v.md_de > r.mdxd_de_lim) push("danger", `MĐXD khối Đế (${v.md_de}%) vượt mức tối đa ${fmt1(r.mdxd_de_lim)}% theo Bảng 9 QCVN 01:2026/BXD (chiều cao khối Đế ≈ ${fmt1(r.h_de)} m, lô ${fmt0(r.dt_kha_dung)} m², nội suy theo diện tích lô).`);else push("ok", `MĐXD khối Đế (${v.md_de}%) ≤ ${fmt1(r.mdxd_de_lim)}% — đạt Bảng 9 QCVN 01:2026/BXD (áp dụng riêng khối Đế theo CHÚ THÍCH 2).`);
  if (v.md_thap > r.mdxd_thap_lim) push("danger", `MĐXD khối Tháp (${v.md_thap}%) vượt mức tối đa ${fmt1(r.mdxd_thap_lim)}% theo Bảng 9 QCVN 01:2026/BXD (chiều cao công trình ≈ ${fmt1(r.h_ct)} m, lô ${fmt0(r.dt_kha_dung)} m²).`);else push("ok", `MĐXD khối Tháp (${v.md_thap}%) ≤ ${fmt1(r.mdxd_thap_lim)}% — đạt Bảng 9 QCVN 01:2026/BXD.`);
  if (r.far > REF.far_max) {
    if (r.far <= REF.far_max_dacbiet && r.far_ngoai_le) push("warn", `FAR (${fmt2(r.far)} lần) vượt 13 lần — chỉ được chấp thuận theo ngoại lệ điểm 2.5.3.5 QCVN 01:2026/BXD (tối đa 18 lần): phải thuộc khu vực khuyến khích phát triển cao tầng, đạt tiêu chí điểm nhấn kiến trúc và các điều kiện hạ tầng kèm theo (thửa ≥ 3,5 ha và MĐXD ≤ 35% đã thỏa).`);else push("danger", `Hệ số sử dụng đất FAR (${fmt2(r.far)} lần) vượt mức tối đa ${REF.far_max} lần với công trình ≥ 46 m (điểm 2.5.3.5 QCVN 01:2026/BXD)${r.far <= REF.far_max_dacbiet ? " — không đủ điều kiện ngoại lệ 18 lần (cần thửa ≥ 3,5 ha và MĐXD thuần ≤ 35%)." : "."}`);
  }
  if (r.h_ct >= 46) push("warn", `Công trình cao ≈ ${fmt1(r.h_ct)} m (≥ 46 m): khoảng cách cạnh dài giữa các tháp ≥ 25 m, đầu hồi ≥ 15 m (điểm 2.5.1.2 QCVN 01:2026/BXD) — kiểm tra khi bố trí tổng mặt bằng.`);
  if (r.dan_so > REF.danso_dvo_max) push("warn", `Dân số dự án (${fmt0(r.dan_so)} người) vượt quy mô tối đa 1 đơn vị ở đô thị (${fmt0(REF.danso_dvo_max)} người, điểm 2.2.2.2 QCVN 01:2026/BXD) — phải tổ chức thành ≥ 2 đơn vị ở với đầy đủ hạ tầng xã hội tương ứng.`);
  push("ok", `Đất cây xanh sử dụng công cộng trong đơn vị ở tối thiểu ${fmt0(r.dan_so * REF.cayxanh_dvo_min)} m² (${REF.cayxanh_dvo_min} m²/người, điểm 2.2.3.1) + tối thiểu 1 công viên ≥ 5.000 m² hoặc 2 công viên ≥ 2.500 m² (điểm 2.2.3.2 QCVN 01:2026/BXD); tỷ lệ trồng cây xanh trong lô chung cư ≥ 16 m: ≥ 20% (Bảng 11).`);
  if (r.dat_tre < r.dan_so * REF.mamnon_min) push("warn", `Đất trường mầm non theo TCVN 3907 (${fmt0(r.dat_tre)} m²) THẤP HƠN chỉ tiêu tối thiểu ${fmt0(r.dan_so * REF.mamnon_min)} m² (0,60 m²/người, Bảng 6 QCVN 01:2026/BXD) — áp dụng giá trị lớn hơn khi lập QHCT 1/500.`);
  if (v.tong_tang > REF.tang_noxh_max) push("warn", `Tổng số tầng (${v.tong_tang}) vượt mức tham khảo ${REF.tang_noxh_max} tầng — cần đối chiếu QHCT 1/500 cụ thể.`);
  if (v.tang_ham > REF.tang_ham_max) push("warn", `Số tầng hầm (${v.tang_ham}) vượt ${REF.tang_ham_max} tầng — QĐ 425/QĐ-BXD không công bố suất vốn cho mức này.`);
  if (v.md_ham > REF.ham_max_pct) push("warn", `MĐXD tầng hầm (${v.md_ham}%) vượt ngưỡng hợp lý ${REF.ham_max_pct}% — cần biện pháp kết cấu đặc biệt.`);
  if (r.fp_1thap > 3000) push("warn", `Footprint/tháp (${fmt0(r.fp_1thap)} m²) quá lớn — không khả thi cho 1 đơn nguyên thực tế. Tăng số lượng tháp.`);else if (r.fp_1thap < 800) push("warn", `Footprint/tháp (${fmt0(r.fp_1thap)} m²) quá nhỏ — kém hiệu quả kết cấu/lõi kỹ thuật. Giảm số lượng tháp.`);
  if (r.can_tang_thap > 12) push("warn", `Số căn/tầng/tháp (${fmt1(r.can_tang_thap)}) quá nhiều — 1 tháp thường chỉ có 4–10 căn/tầng.`);
  if (r.dat_can_thap > r.dt_kha_dung) push("danger", `Diện tích đất cần cho ${v.so_thap} tháp (ước lượng ${fmt0(r.dat_can_thap)} m²) vượt diện tích đất khả dụng (${fmt0(r.dt_kha_dung)} m²) — bố trí quá chật.`);
  if (r.doi_chieu_doxe < 0) push("danger", `Thiếu diện tích đỗ xe trong hầm (thiếu ${fmt0(-r.doi_chieu_doxe)} m²) — cần tăng tầng hầm, tăng MĐXD hầm, hoặc bổ sung bãi đỗ ngoài.`);
  if (r.so_tre > 1050) push("warn", `Số trẻ cần phục vụ (${fmt0(r.so_tre)}) vượt quy mô 1.050 cháu — QĐ 425/QĐ-BXD chỉ công bố đến mức này, có thể cần ≥2 điểm trường.`);
  if (r.dat_tre > r.dt_kha_dung * 0.05) push("warn", `Diện tích đất nhà trẻ (${fmt0(r.dat_tre)} m²) vượt 5% tổng đất khả dụng — đối chiếu lại QHCT 1/500.`);
  if (v.tyle_chothue < 25) push("danger", `Tỷ lệ diện tích sàn NOXH dành để cho thuê (${v.tyle_chothue}%) THẤP HƠN mức tối thiểu 25% theo yêu cầu mới của Thành phố (thay cho mức 20% trước đây) — điều chỉnh về ≥ 25%.`);else push("ok", `Dành ${v.tyle_chothue}% diện tích sàn NOXH để cho thuê (${fmt0(r.dt_thue_m2)} m² ≈ ${fmt0(r.so_can_thue)} căn) — đạt mức tối thiểu 25% theo quy định mới. Tiền thuê ròng ≈ ${fmtTy(r.thue_rong_nam)} tỷ/năm; giá trị quy về hiện tại của phần cho thuê (${v.so_nam_thue} năm thuê + bán lại, chiết khấu ${v.ck_thue}%/năm) ≈ ${fmtTy(r.dt_chothue)} tỷ đồng.`);
  if (r.ts_ln_dt > v.ln_dinhmuc) push("danger", `Tỷ suất LN/Doanh thu (${fmt1(r.ts_ln_dt)}%) VƯỢT mức lợi nhuận định mức ${v.ln_dinhmuc}% cho phép theo NĐ 100/2024/NĐ-CP — cần giảm giá bán hoặc nộp lại phần vượt.`);else if (r.ts_ln_dt < 0) push("danger", `Phương án đang LỖ: Tỷ suất LN/Doanh thu = ${fmt1(r.ts_ln_dt)}%.`);else push("ok", `Tỷ suất LN/Doanh thu (${fmt1(r.ts_ln_dt)}%) trong mức lợi nhuận định mức ${v.ln_dinhmuc}% cho phép.`);
  if (isFinite(r.gia_noxh_can) && r.gia_noxh_can > 25000000 * 1.001) push("warn", `Giá bán NOXH cần để đạt LN mục tiêu (${fmt0(r.gia_noxh_can)} đ/m²) vượt khung phổ biến Hà Nội (18–25 triệu/m²).`);
  push("ok", `Cơ sở đối chiếu: QCVN 01:2026/BXD ban hành kèm TT 46/2026/TT-BXD ngày 30/6/2026, hiệu lực 01/01/2027, thay thế QCVN 01:2021/BXD. Quy hoạch đã phê duyệt/thẩm định trước ngày hiệu lực tiếp tục thực hiện theo quyết định duyệt; trường hợp điều chỉnh quy hoạch sau ngày hiệu lực phải tuân thủ quy chuẩn mới (mục 5.4).`);
  return w;
}
